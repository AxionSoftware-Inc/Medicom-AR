<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medicom AR Navigator</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video id="bg-video" autoplay playsinline muted></video>

    <div id="start-screen">
        <h1>Medicom AR</h1>
        <p>Telefonni to'g'ri ushlab, QR kod qarshisida turing</p>
        <button class="btn-main" onclick="initSystem()">SCAN & START 🚀</button>
    </div>

    <div id="ui-layer" style="display: none;">
        
        <div id="rooms-menu" class="menu-expanded">
            <div class="menu-header" onclick="toggleMenu()">
                <span id="current-target">Xonani tanlang</span>
                <span id="toggle-icon">▼</span>
            </div>
            <div id="rooms-list" class="grid-container">
                </div>
        </div>

        <div id="hud-info" style="display: none;">
            <div class="hud-box">
                <span id="target-name">...</span> ga borilmoqda
            </div>
        </div>

    </div>

    <a-scene vr-mode-ui="enabled: false">
        <a-entity id="rig" position="0 0 0">
            <a-camera id="cam" look-controls="enabled: true;"></a-camera>
        </a-entity>
        <a-entity id="world-root" position="0 0.5 0"></a-entity>
    </a-scene>

    <script src="script.js"></script>
</body>
</html>
